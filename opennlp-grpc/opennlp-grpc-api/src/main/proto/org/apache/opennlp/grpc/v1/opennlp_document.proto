syntax = "proto3";

package org.apache.opennlp.grpc.v1;

option java_package = "org.apache.opennlp.grpc.v1";
option java_multiple_files = true;
// Explicit outer classname: without it, protoc derives "OpennlpDocument" from
// the filename, which collides with the OpenNlpDocument message on
// case-insensitive filesystems (macOS, Windows).
option java_outer_classname = "OpenNlpDocumentProto";

import "google/protobuf/struct.proto";

// Canonical 1:1 NLP document: text in, annotations out.
// The sentences list provides the shared base linguistic analysis
// (computed once even when multiple chunk+embed groups are requested).
message OpenNlpDocument {
  string doc_id = 1;
  string raw_text = 2;
  optional string detected_language = 3;
  optional float language_confidence = 4;
  repeated AnnotatedSentence sentences = 5;
  optional DocumentAnalytics analytics = 6;
  // Opaque client-supplied metadata, echoed back verbatim. The server never
  // writes first-class results here; it is a passthrough lane only.
  google.protobuf.Struct metadata = 7;
  repeated EmbeddingResult embeddings = 8;  // denormalized convenience "all vectors + spans"
  optional DocumentClassification classification = 9;

  // Primary way to carry multiple independent chunk+embedding result groups
  // from one analysis. Each group corresponds to one chunking strategy with
  // its explicitly requested embedding models attached inside the chunks.
  repeated ChunkEmbeddingGroup chunk_embedding_groups = 10;

  // Unit of every AnnotationSpan start/end offset in this document (uniform).
  // Echoes the requested AnalysisOptions.offset_encoding; defaults to UTF-8 bytes.
  OffsetEncoding offset_encoding = 11;
}

message AnnotatedSentence {
  AnnotationSpan sentence_span = 1;
  repeated Token tokens = 2;
  repeated NamedEntity entities = 3;
  // Classic syntactic chunks (from ChunkerME or similar), per sentence.
  optional ChunkResult syntactic_chunks = 4;
  optional ParseTree parse_tree = 5;
  optional string sentiment_label = 6;
  optional float sentiment_confidence = 7;
}

message Token {
  string text = 1;
  AnnotationSpan annotation_span = 2;
  optional string pos_tag = 3;
  optional string lemma = 4;
  optional float pos_probability = 5;
}

message NamedEntity {
  AnnotationSpan annotation_span = 1;
  string entity_type = 2;
  optional double probability = 3;
}

// Offset range for an annotation. The coordinate space is explicit so future
// token-relative indices can be represented without overloading field names.
// v1 server responses use COORDINATE_SPACE_CHAR_DOCUMENT exclusively.
message AnnotationSpan {
  int32 start = 1;
  int32 end = 2;
  CoordinateSpace space = 3;
  optional string type = 4;
  optional double probability = 5;
}

enum CoordinateSpace {
  COORDINATE_SPACE_UNSPECIFIED = 0;
  COORDINATE_SPACE_CHAR_DOCUMENT = 1;
  COORDINATE_SPACE_TOKEN_SENTENCE = 2;
}

// Unit that AnnotationSpan.start/end are measured in. Orthogonal to
// CoordinateSpace (which says what the offset is relative to). The wire
// default is UTF-8 bytes, aligning with the protobuf encoding of raw_text so
// non-JVM clients slice correctly without conversion.
enum OffsetEncoding {
  OFFSET_ENCODING_UNSPECIFIED = 0;
  OFFSET_ENCODING_UTF8_BYTE = 1;           // default; matches the raw_text wire bytes
  OFFSET_ENCODING_UTF16_CODE_UNIT = 2;     // Java/OpenNLP native
  OFFSET_ENCODING_UNICODE_CODE_POINT = 3;  // language-neutral codepoints
}

message DocumentAnalytics {
  int32 total_tokens = 1;
  int32 total_sentences = 2;
  float noun_density = 3;
  float verb_density = 4;
  float adjective_density = 5;
  float adverb_density = 6;
  float content_word_ratio = 7;
  int32 unique_lemma_count = 8;
  float lexical_density = 9;
}

// Lightweight result for classic syntactic chunking (ChunkerME style)
// attached to sentences. Distinct from the strategy-driven chunks below.
message ChunkResult {
  repeated ChunkSpan chunks = 1;
}

message ChunkSpan {
  AnnotationSpan annotation_span = 1;
  string chunk_tag = 2;
}

// A chunk produced by a chunking strategy. The strategy and the list of
// embedding models are declared on the containing ChunkEmbeddingGroup.
// Embeddings for the requested models are carried inside this chunk.
message Chunk {
  AnnotationSpan annotation_span = 1;
  optional string chunk_tag = 2;
  // The text of the chunk (for client convenience; authoritative bounds
  // are given by annotation_span over the document raw_text).
  optional string text_content = 3;
  // Multiple embedding models per chunk, as requested for the group/strategy.
  repeated EmbeddingResult embeddings = 4;
  // Optional navigation aid: indices into the document's sentences list.
  repeated int32 contained_sentence_indices = 5;
}

// One chunking strategy's output: the chunks (with their embeddings inside)
// plus traceability for the strategy and the exact embedding models that
// were asked for this strategy in the request.
message ChunkEmbeddingGroup {
  string group_id = 1;
  optional string chunk_config_id = 2;
  repeated string embedding_model_ids = 3;  // exactly as named for this strategy
  optional string result_set_name = 4;
  repeated Chunk chunks = 5;
  optional ChunkGroupStats stats = 6;
  optional EmbeddingGranularity granularity = 7;
}

// Typed per-group statistics/provenance (replaces an untyped metadata map).
message ChunkGroupStats {
  int32 chunk_count = 1;
  int32 total_tokens = 2;
  int64 processing_time_ms = 3;
}

// A constituency (phrase-structure) parse of one sentence. The server populates the
// representations the request selects via AnalysisOptions.parse_formats; an unselected
// representation is left empty. The structured tree and the bracketed string are independent
// views of the same parse, so a client takes whichever fits its language and use.
message ParseTree {
  // Structured, navigable tree (PARSE_FORMAT_STRUCTURED). Empty when not requested.
  ParseNode root = 1;
  // Standard bracketed (Penn-Treebank-style) form (PARSE_FORMAT_BRACKETED), as emitted by
  // OpenNLP's Parse.show(), e.g. "(TOP (S (NP (DT The)(NN dog))(VP (VBD barked))))". The
  // universal interchange/debug representation; every NLP toolkit can read it.
  optional string penn_treebank = 2;
}

// One node of a constituency parse. A nonterminal is a phrase (its label is a phrase tag such
// as S/NP/VP and it has children); a terminal is a single token (its label is the POS tag, it
// has no children, and token_index links it to the sentence's token list rather than repeating
// the token text).
message ParseNode {
  string label = 1;                  // phrase tag (nonterminal) or POS tag (terminal)
  AnnotationSpan span = 2;           // document span this node covers
  repeated ParseNode children = 3;   // empty for terminals
  optional double probability = 4;   // model confidence for this node
  // Whether this node is a phrase or a single token. Explicit so clients switch on the kind
  // instead of inferring "leaf == no children".
  ParseNodeKind kind = 5;
  // Terminals only: index into the enclosing AnnotatedSentence.tokens. Unset on nonterminals.
  optional int32 token_index = 6;
}

enum ParseNodeKind {
  PARSE_NODE_KIND_UNSPECIFIED = 0;
  PARSE_NODE_KIND_NONTERMINAL = 1;   // a phrase / constituent
  PARSE_NODE_KIND_TERMINAL = 2;      // a single token (preterminal carrying the POS tag)
}

message EmbeddingResult {
  string model_id = 1;
  repeated float vector = 2;
  AnnotationSpan source_span = 3;
  EmbeddingGranularity granularity = 4;
}

enum EmbeddingGranularity {
  EMBEDDING_GRANULARITY_UNSPECIFIED = 0;
  EMBEDDING_GRANULARITY_DOCUMENT = 1;
  EMBEDDING_GRANULARITY_SENTENCE = 2;
  EMBEDDING_GRANULARITY_CHUNK_LEVEL = 3;  // embeddings attached to chunks of a strategy/group
  reserved 4 to 10;
}

message DocumentClassification {
  string best_category = 1;
  map<string, double> category_scores = 2;
}
